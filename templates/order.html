<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos - JC STORE</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='STYLE.css') }}">
</head>
<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container">

        <a class="navbar-brand" href="/">JC STORE</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">Inicio</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/products-page">Productos</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/login-page">Login</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="/orders-page">Pedidos</a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<!-- CONTENIDO -->

<div class="container py-5">

    <h1 class="title-page text-center mb-5">
        Sistema de Pedidos
    </h1>

    <div class="row g-4">

        <!-- ORDER SERVICE -->

        <div class="col-md-6">

            <div class="info-card h-100">

                <h3 class="mb-4">Order Service</h3>

                <p>
                    Este servicio permite crear y consultar pedidos usando APIs REST.
                </p>

                <div class="mt-4">

                    <div class="api-box mb-3">
                        <strong>GET</strong> /orders
                    </div>

                    <div class="api-box">
                        <strong>POST</strong> /orders
                    </div>

                </div>

            </div>

        </div>

        <!-- CREAR PEDIDO -->

        <div class="col-md-6">

            <div class="info-card h-100">

                <h3 class="mb-4">Crear Pedido</h3>

                <form id="orderForm">

                    <input 
                        type="text"
                        class="form-control mb-3"
                        id="product"
                        placeholder="Nombre del producto"
                        required
                    >

                    <input 
                        type="number"
                        class="form-control mb-3"
                        id="quantity"
                        placeholder="Cantidad"
                        required
                    >

                    <button class="btn btn-custom w-100">
                        Crear Pedido
                    </button>

                </form>

                <p id="orderMessage" class="mt-3"></p>

            </div>

        </div>

    </div>

</div>

<!-- FOOTER -->

<footer>
    <p>JC STORE © 2026 - Proyecto SOA</p>
</footer>

<script>

const orderForm = document.getElementById('orderForm');

orderForm.addEventListener('submit', async (e) => {

    e.preventDefault();

    const product = document.getElementById('product').value;
    const quantity = document.getElementById('quantity').value;

    const response = await fetch('/orders', {

        method: 'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body: JSON.stringify({
            product,
            quantity
        })

    });

    const data = await response.json();

    const message = document.getElementById('orderMessage');

    message.innerHTML = data.message;

    message.style.color = '#22c55e';

    orderForm.reset();

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
