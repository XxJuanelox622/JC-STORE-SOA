<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Productos - JC STORE</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='STYLE.css') }}">
</head>
<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">

    <div class="container">

        <a class="navbar-brand" href="/">
            JC STORE
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">Inicio</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="/products-page">Productos</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/login-page">Login</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/orders-page">Pedidos</a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- TITULO -->

<div class="container py-5">

    <div class="text-center mb-5">

        <h1 class="title-page">
            Productos Gamer y Tecnología
        </h1>

        <p class="subtitle">
            Computadoras, accesorios y componentes de alto rendimiento
        </p>

    </div>

    <!-- PRODUCTOS -->

    <div class="row g-4">

        {% for product in products %}

        <div class="col-lg-3 col-md-6">

            <div class="product-card">

                <div class="product-image">

                    <img src="{{ product.image }}" alt="{{ product.name }}">

                </div>

                <div class="product-info">

                    <h4>{{ product.name }}</h4>

                    <p class="price">
                        $ {{ product.price }}
                    </p>

                    <button class="btn btn-custom w-100">
                        Agregar al carrito
                    </button>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

<!-- FOOTER -->

<footer>

    <p>
        JC STORE © 2026 - Proyecto SOA
    </p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
